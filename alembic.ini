#
# Alembic configuration for OpenSalesTax.
#
# The actual database URL is loaded at runtime from the
# OPENSALESTAX_DATABASE_URL env var via env.py -- there is no
# `sqlalchemy.url` setting here. This keeps the same migrations
# portable across PostgreSQL and MariaDB without config drift.

[alembic]
script_location = src/opensalestax/db/migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Don't trust mako templates for revision generation -- we hand-write
# initial migrations and use --autogenerate against an existing DB
# only for incremental schema changes (and we always review the diff
# before committing).

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
