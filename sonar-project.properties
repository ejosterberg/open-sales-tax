# SonarQube scanner configuration for OpenSalesTax.
# Used by the local sonar-scanner CLI (see docs/SONARQUBE.md when added)
# and any future GitHub Actions integration.

sonar.projectKey=opensalestax
sonar.projectName=OpenSalesTax
sonar.projectVersion=0.59.0

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/*.egg-info/**,specs/research/sovos-state-summary.tsv
sonar.test.exclusions=**/__init__.py
sonar.coverage.exclusions=src/opensalestax/db/migrations/**,src/opensalestax/__main__.py,src/opensalestax/cli/main.py

# Per-rule issue suppressions.
#
# === e1, e2: python:S1192 (duplicated string literals) ===
# The rule fires on every county/jurisdiction name reused across state
# mappings, which is genuine repetition by design (county_names.py maps
# FIPS -> name for ~3,000 US counties; "Lincoln County" alone appears in
# 18 states). The *_data.py files are similarly flat lookup tables of
# jurisdiction codes, rates, and ZIP prefixes -- repeating a sentinel
# like "0000" across rows is the schema, not a refactorable duplication.
# Refactoring these to extract constants would harm readability for zero
# correctness benefit. Suppressing keeps the scan signal focused on real
# code smells.
#
# === e3: python:S3776 (cognitive complexity > 15) on state modules ===
# Each state's parse_rates / parse_boundaries / taxability_for /
# special_cases is structurally a big match-statement-like dispatch
# because US sales tax law IS branchy: each state has special-cases
# for clothing, food, services, exemptions, holidays, district overlays,
# etc. Mechanical refactors (extract-function for every branch) would
# scatter the per-state tax logic across files, making it harder for a
# contributor cross-checking against the state's DOR publication to find
# the relevant code. The COMPENSATING CONTROL is per-state unit-test
# coverage: every state module has a corresponding tests/unit/test_state_
# <state>.py file pinning the rate stack at known-good ZIPs against the
# state's DOR-published rates. The DOR validation grid in tests/
# integration/test_sst_dor_validation.py covers cross-state behavior with
# 781+ ZIP+4 entries (see specs/handoff.md). Reviewer note: anyone
# proposing to lower this complexity should propose it with the state
# module's test count as part of the patch's safety case.
#
# === e4: python:S3776 on core ===
# core/lookup.py and core/calculate.py have the same shape -- the engine
# walks the per-ZIP authority stack handling many overlay patterns
# (city-in-county, district-on-city, MCTD-on-county, etc.). Same
# compensating control: high integration-test coverage in tests/
# integration/. The functions are profile-friendly and lookup is the
# hot path; refactoring for cognitive complexity alone would slow it
# down without correctness benefit.
#
# === e5: python:S3776 on data ===
# sst_parser.py and zcta_loader.py parse externally-defined file formats
# (SST quarterly CSV; Census ZCTA cross-walks) where the source format
# dictates the branching shape. Refactoring would just hide the
# columns-to-fields mapping.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=src/opensalestax/data/county_names.py
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=src/opensalestax/states/*_data.py
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e3.resourceKey=src/opensalestax/states/*.py
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=src/opensalestax/core/*.py
sonar.issue.ignore.multicriteria.e5.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e5.resourceKey=src/opensalestax/data/*.py

sonar.host.url=http://10.32.161.205:9000
